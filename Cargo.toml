# authors = ["Anders <git@anders.place>"]

# [features]
# backend = [
#     "actix-web",
#     "actix-files",
#     "actix-web-flash-messages",
#     "actix-dioxus-serve",
# ]
# default = [
#     "desktop",
#     "safe_mode",
# ]
# desktop = [
#     "dioxus/desktop",
